name: ClassRPG
version: 1.0
main: com.example.randomclass.RandomClassPlugin
api-version: "1.21"
description: A plugin that randomly assigns classes to players on first join.
commands:
  job:
    description: Get a random class or manage your class
    usage: /job
    permission: randomclass.job
  class:
    description: Check your class
    usage: /class
    permission: randomclass.check
  status:
    description: Toggle the status display sidebar
    usage: /status
    permission: randomclass.status
permissions:
  randomclass.job:
    default: true
  randomclass.check:
    default: true
  randomclass.status:
    default: true
  randomclass.admin:
    description: Admin permission for ClassRPG
    default: op
